name: SBOM (Monorepo - CycloneDX)

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate SBOM (CycloneDX - Repo)
        uses: anchore/sbom-action@v0
        if: ${{ env.ACT != 'true' }}
        with:
          format: cyclonedx-json
          output-file: sbom.repo.cdx.json
          artifact-name: sbom-repo-cyclonedx
          # `act` does not provide `github.token` (ACTIONS_RUNTIME_TOKEN / GITHUB_TOKEN),
          # and this action requires auth when uploading artifacts.
          # Skip artifact upload during local `act` runs.
          upload-artifact: ${{ env.ACT != 'true' }}
